name: INMeetings
options:
  bundleIdPrefix: com.in-venture
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  INMeetingsCore:
    path: ../..
  # Sparkle 2 — in-app auto-update. Update security is EdDSA-based (independent of Apple
  # Developer-ID/notarization), so updates work for the internal unsigned builds too once a
  # signed appcast is published; the $99 account only gates a Gatekeeper-clean first install.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

schemes:
  INMeetings-App:
    build:
      targets:
        INMeetings: all
    run:
      config: Debug

targets:
  INMeetings:
    type: application
    supportedDestinations: [macOS]
    sources:
      - path: INMeetings
        excludes:
          - "Resources/skills"
          - "AppIcon.icon"
      # The saventa-summary recipe + house-style is bundled as a folder reference so its subdirectory
      # structure (house-style/*.md) survives into the .app — SummaryRunner reads it from the bundle.
      - path: INMeetings/Resources/skills
        type: folder
        buildPhase: resources
      # The Icon Composer app icon (macOS 26 layered Liquid Glass). `.icon` is a wrapper *directory*, so
      # force `type: file` — otherwise XcodeGen makes it a blue folder reference and just copies the raw
      # icon.json/layer PNG into Resources instead of letting actool compile it (→ no CFBundleIconName).
      - path: INMeetings/AppIcon.icon
        type: file
        buildPhase: resources
    dependencies:
      - package: INMeetingsCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: "INV Meetings"
        PRODUCT_BUNDLE_IDENTIFIER: com.in-venture.in-meetings
        INFOPLIST_FILE: INMeetings/Info.plist
        CODE_SIGN_ENTITLEMENTS: INMeetings/INMeetings.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: A6C6D257QN
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/../Frameworks"]
